    <section>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
            }

            .column {
                float: left;
                width: 25%;
                padding: 10px;
            }

            /* Style the images inside the grid */
            .column img {
                opacity: 0.8;
                cursor: pointer;
            }

            .column img:hover {
                opacity: 1;
            }

            /* Clear floats after the columns */
            .row:after {
                content: "";
                display: table;
                clear: both;
            }

            /* The expanding image container */
            .container {
                position: relative;
                display: none;
            }

            /* Expanding image text */
            #imgtext {
                position: absolute;
                bottom: 15px;
                left: 15px;
                color: white;
                font-size: 20px;
            }

            /* Closable button inside the expanded image */
            .closebtn {
                position: absolute;
                top: 10px;
                right: 15px;
                color: white;
                font-size: 35px;
                cursor: pointer;
            }
        </style>


        <div style="text-align:center">
            <div style="padding: 10px;" class="d-flex align-items-center justify-content-center">
                <div class="d-flex flex-column">
                    <h1 class="font-weight-bold text-danger display-4">Personal</h1>
                    <p>They say a picture is worth a thousand words. Here are 12,000 words about me.</p>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="column">
                <img src="resources/images/running2.jpeg"

            </div>
            <div class="column">

            </div>

            <div class="column">

            <div class="column">

            </div>

            <div class="column">

            <div class="column">

            <div class="column">

            </div>
            <div class="column">

            </div>
            <div class="column">

            </div>
            <div class="column">
                <img src="resources/images/st-pete.jpeg" alt="St. Petersburg, FL. Spring Break 2023" style="width:100%"
                    onclick="myFunction(this);">
            </div>
        </div>

        <div class="container">
            <span onclick="this.parentElement.style.display='none'" class="closebtn">&times;</span>
            <img id="expandedImg" style="width:100%">
            <div id="imgtext"></div>
        </div>

        <script>
            function myFunction(imgs) {
                var expandImg = document.getElementById("expandedImg");
                var imgText = document.getElementById("imgtext");
                expandImg.src = imgs.src;
                imgText.innerHTML = imgs.alt;
                expandImg.parentElement.style.display = "block";
            }
        </script>
